<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Owner Platform - EMS</title><link rel="stylesheet" href="css/style.css"><style>body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#111827,#312e81);padding:20px}.card{width:min(430px,100%);background:#fff;border-radius:24px;padding:30px;box-shadow:0 30px 90px #0007}.logo{width:54px;height:54px;border-radius:16px;background:#5b4df7;color:white;display:grid;place-items:center;font-size:24px;font-weight:800}.field{display:grid;gap:7px;margin:16px 0}.field input{padding:13px;border:1px solid #d1d5db;border-radius:11px;font:inherit}.primary{width:100%;padding:13px;border:0;border-radius:11px;background:#5b4df7;color:#fff;font:inherit;font-weight:700}.note{font-size:13px;padding:12px;border-radius:10px;background:#f3f4f6}.error{color:#b91c1c;min-height:22px}</style></head><body><main class="card"><div class="logo">P</div><h1 id="title">Owner Platform EMS</h1><p id="subtitle">Kelola seluruh pelanggan dari panel pusat.</p><div id="note" class="note" hidden>Buat akun Owner Platform pertama. Akun ini berbeda dari akun admin pelanggan.</div><form id="form"><label class="field">Nama<input id="nama" autocomplete="name"></label><label class="field">Username<input id="username" autocomplete="username" minlength="4" required></label><label class="field">Password<input id="password" type="password" autocomplete="current-password" minlength="8" required></label><label class="field" id="confirmWrap" hidden>Ulangi Password<input id="confirm" type="password" minlength="8"></label><div id="error" class="error"></div><button id="submit" class="primary">Masuk</button></form></main><script src="js/config.js"></script><script>
const KEY='ems_platform_session';let setup=false;
async function init(){try{const d=await(await fetch(`${EMS_API_URL}?action=getPlatformSetupStatus&t=${Date.now()}`,{cache:'no-store'})).json();setup=!d.configured;if(setup){title.textContent='Buat Owner Platform';subtitle.textContent='Akun pusat untuk mengelola pelanggan EMS.';note.hidden=false;confirmWrap.hidden=false;submit.textContent='Buat Akun & Masuk';nama.parentElement.hidden=false}else{nama.parentElement.hidden=true}}catch(e){error.textContent='Gagal terhubung ke server.'}}
form.onsubmit=async e=>{e.preventDefault();error.textContent='';if(setup&&password.value!==confirm.value){error.textContent='Ulangi password tidak sama.';return}submit.disabled=true;try{const d=await(await fetch(EMS_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:setup?'setupPlatformOwner':'loginPlatformOwner',nama:nama.value.trim(),username:username.value.trim(),password:password.value})})).json();if(!d.success)throw new Error(d.message||'Login gagal.');localStorage.setItem(KEY,JSON.stringify({token:d.token,username:d.username,nama:d.nama||d.username}));location.replace('platform.html')}catch(e){error.textContent=e.message}finally{submit.disabled=false}};init();
</script></body></html>
