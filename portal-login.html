<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#5b4df7"><title>Masuk Portal Karyawan - EMS</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="js/config.js"></script><style>body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#f4f1ff,#eef7ff);padding:18px}.login-card{width:min(430px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:28px;box-shadow:0 20px 60px #312e8120}.logo{width:58px;height:58px;border-radius:18px;background:#5b4df7;color:#fff;display:grid;place-items:center;font-weight:800;font-size:25px}.pin{width:100%;font-size:28px;letter-spacing:12px;text-align:center;padding:14px;border:1px solid #d1d5db;border-radius:14px}.btn{width:100%;padding:14px;border:0;border-radius:13px;background:#5b4df7;color:#fff;font-weight:700;margin-top:14px}.muted{color:#6b7280;line-height:1.6}</style></head><body><main class="login-card"><div class="logo">E</div><h1>Portal Karyawan</h1><p class="muted">Masukkan PIN pribadi. Portal dapat digunakan untuk melihat jadwal, riwayat, izin, pengumuman, dan slip gaji.</p><input id="pin" class="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="one-time-code"><button class="btn" onclick="login()">Masuk</button><p class="muted" style="font-size:13px">Absensi masuk dan pulang tetap dilakukan melalui QR toko agar GPS dan lokasi toko tetap diverifikasi.</p></main><script>const saved=JSON.parse(localStorage.getItem('ems_portal_session')||'null');if(saved?.token&&saved.expiresAt>Date.now())location.href='portal.html';async function login(){const value=pin.value.trim();if(!/^\d{4}$/.test(value))return Swal.fire('PIN belum lengkap','Masukkan PIN 4 digit.','warning');Swal.fire({title:'Memeriksa...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});try{const r=await fetch(EMS_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'loginPortal',pin:value})});const d=await r.json();if(!d.success)throw new Error(d.message);localStorage.setItem('ems_portal_session',JSON.stringify({token:d.token,expiresAt:Date.now()+(d.expiresInHours||12)*3600000,karyawan:d.karyawan}));location.href='portal.html';}catch(e){Swal.fire('Gagal masuk',e.message,'error')}}if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script></body></html>
