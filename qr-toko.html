<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>QR Absensi Toko</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<body class="qr-page">

  <main class="qr-shell">

    <header class="qr-header">
      <div>
        <small>Employee Management System</small>
        <h1>QR Absensi Toko</h1>
      </div>
    </header>

    <section class="qr-grid">

      <article class="qr-card">
        <div class="qr-store-icon">
          <i data-lucide="store"></i>
        </div>

        <h2>TK. Ana Yuliana</h2>
        <p>Scan QR ini untuk membuka halaman absensi.</p>

        <div
          id="qrTokoAna"
          class="qr-code-box">
        </div>

        <small class="qr-id">ID Toko: T001</small>

        <button
          class="qr-print-button"
          onclick="printQr('ana')">
          <i data-lucide="printer"></i>
          Cetak QR
        </button>
      </article>

      <article class="qr-card">
        <div class="qr-store-icon">
          <i data-lucide="store"></i>
        </div>

        <h2>TK. Ayana Cosmetics</h2>
        <p>Scan QR ini untuk membuka halaman absensi.</p>

        <div
          id="qrTokoAyana"
          class="qr-code-box">
        </div>

        <small class="qr-id">ID Toko: T002</small>

        <button
          class="qr-print-button"
          onclick="printQr('ayana')">
          <i data-lucide="printer"></i>
          Cetak QR
        </button>
      </article>

    </section>

  </main>

  <script>
    const BASE_ABSEN_URL =
      "https://employee-management-system-sigma-sage.vercel.app/absen.html";

    const linkAna =
      `${BASE_ABSEN_URL}?toko=T001`;

    const linkAyana =
      `${BASE_ABSEN_URL}?toko=T002`;

    new QRCode(
      document.getElementById("qrTokoAna"),
      {
        text: linkAna,
        width: 240,
        height: 240,
        correctLevel: QRCode.CorrectLevel.H
      }
    );

    new QRCode(
      document.getElementById("qrTokoAyana"),
      {
        text: linkAyana,
        width: 240,
        height: 240,
        correctLevel: QRCode.CorrectLevel.H
      }
    );

    function printQr(toko) {
      document.body.classList.remove(
        "print-ana",
        "print-ayana"
      );

      document.body.classList.add(
        toko === "ana"
          ? "print-ana"
          : "print-ayana"
      );

      window.print();

      setTimeout(() => {
        document.body.classList.remove(
          "print-ana",
          "print-ayana"
        );
      }, 500);
    }

    lucide.createIcons();
  </script>

</body>
</html>
