<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Absensi Toko</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/config.js"></script><script src="js/admin-auth.js"></script>
</head>
<body class="qr-page">
  <main class="qr-shell">
    <header class="qr-header">
      <div>
        <small>Employee Management System</small>
        <h1>QR Absensi Toko</h1>
      </div>
    </header>

    <section id="qrStoreGrid" class="qr-grid">
      <p>Memuat daftar toko...</p>
    </section>
  </main>

  <script>
    const BASE_ABSEN_URL = `${window.location.origin}/absen.html`;

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadQrToko() {
      const grid = document.getElementById("qrStoreGrid");

      try {
        const response = await fetch(`${EMS_API_URL}?action=listToko`);
        const data = await response.json();

        if (!data.success) {
          throw new Error(data.message || "Daftar toko gagal dimuat.");
        }

        const items = Array.isArray(data.items) ? data.items : [];

        if (items.length === 0) {
          grid.innerHTML = "<p>Belum ada toko yang terdaftar.</p>";
          return;
        }

        grid.innerHTML = items.map((toko, index) => `
          <article class="qr-card qr-print-poster" data-store-index="${index}">
            <div class="qr-poster-border">
              <div class="qr-poster-header">
                <div class="qr-poster-logo">
                  <i data-lucide="store"></i>
                </div>
                <div>
                  <small>EMPLOYEE MANAGEMENT SYSTEM</small>
                  <h2>ABSENSI KARYAWAN</h2>
                </div>
              </div>

              <div class="qr-poster-store">
                <span>Lokasi Absensi</span>
                <h3>${escapeHtml(toko.nama)}</h3>
              </div>

              <p class="qr-poster-instruction">
                Scan QR menggunakan kamera HP untuk membuka halaman absensi.
              </p>

              <div id="qrStore-${index}" class="qr-code-box qr-code-print"></div>

              <div class="qr-poster-id">
                <small>ID TOKO</small>
                <strong>${escapeHtml(toko.id)}</strong>
              </div>

              <div class="qr-poster-steps">
                <div><span>1</span><small>Scan QR</small></div>
                <div><span>2</span><small>Aktifkan GPS</small></div>
                <div><span>3</span><small>Selfie & PIN</small></div>
              </div>

              <div class="qr-poster-note">
                <i data-lucide="shield-check"></i>
                <span>Absensi hanya dapat dilakukan di dalam radius toko.</span>
              </div>

              <button class="qr-print-button" onclick="printQr(${index})">
                <i data-lucide="printer"></i>
                Cetak QR
              </button>
            </div>
          </article>
        `).join("");

        items.forEach((toko, index) => {
          const link = `${BASE_ABSEN_URL}?toko=${encodeURIComponent(toko.id)}`;

          new QRCode(document.getElementById(`qrStore-${index}`), {
            text: link,
            width: 240,
            height: 240,
            correctLevel: QRCode.CorrectLevel.H
          });
        });

        lucide.createIcons();
      } catch (error) {
        grid.innerHTML = `<p>Gagal memuat QR toko: ${escapeHtml(error.message)}</p>`;
      }
    }

    let activePrintCard = null;

    function prepareQrForPrint(card) {
      card.querySelectorAll("canvas").forEach(canvas => {
        const existingImage = canvas.parentElement.querySelector("img.qr-print-fallback");
        if (existingImage) return;

        try {
          const image = document.createElement("img");
          image.className = "qr-print-fallback";
          image.alt = "QR Absensi Toko";
          image.src = canvas.toDataURL("image/png");
          image.style.width = `${canvas.width}px`;
          image.style.height = `${canvas.height}px`;
          canvas.insertAdjacentElement("afterend", image);
        } catch (error) {
          console.warn("QR tetap dicetak menggunakan canvas.", error);
        }
      });
    }

    function clearPrintState() {
      document.querySelectorAll(".qr-card.print-active").forEach(card => {
        card.classList.remove("print-active");
      });

      document.querySelectorAll("img.qr-print-fallback").forEach(image => {
        image.remove();
      });

      document.documentElement.classList.remove("is-printing-qr");
      document.body.classList.remove("is-printing-qr");
      activePrintCard = null;
    }

    function printQr(index) {
      clearPrintState();

      const target = document.querySelector(`.qr-card[data-store-index="${index}"]`);
      if (!target) return;

      activePrintCard = target;
      prepareQrForPrint(target);
      target.classList.add("print-active");
      document.documentElement.classList.add("is-printing-qr");
      document.body.classList.add("is-printing-qr");

      requestAnimationFrame(() => {
        requestAnimationFrame(() => window.print());
      });
    }

    window.addEventListener("afterprint", clearPrintState);

    const printMedia = window.matchMedia ? window.matchMedia("print") : null;
    if (printMedia) {
      const handlePrintChange = event => {
        if (!event.matches) {
          window.setTimeout(clearPrintState, 50);
        }
      };

      if (typeof printMedia.addEventListener === "function") {
        printMedia.addEventListener("change", handlePrintChange);
      } else if (typeof printMedia.addListener === "function") {
        printMedia.addListener(handlePrintChange);
      }
    }

    window.addEventListener("focus", () => {
      if (activePrintCard) {
        window.setTimeout(clearPrintState, 250);
      }
    });

    loadQrToko();
  </script>
</body>
</html>
