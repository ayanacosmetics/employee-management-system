<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Izin & Cuti - EMS</title><link rel="stylesheet" href="css/style.css"><style>.main{padding:28px}.toolbar,.cards,.form-grid{display:flex;gap:12px;flex-wrap:wrap}.toolbar>*{min-height:42px}.cards{margin:18px 0}.mini{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;min-width:150px}.mini b{display:block;font-size:26px}.panelx{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid #eee;text-align:left;white-space:nowrap}input,select,textarea,button{font:inherit;padding:10px;border:1px solid #d1d5db;border-radius:9px}button{cursor:pointer}.primary{background:#5b4df7;color:#fff;border:0}.danger{background:#fee2e2;color:#991b1b}.success{background:#dcfce7;color:#166534}.modal{display:none;position:fixed;inset:0;background:#0008;align-items:center;justify-content:center;z-index:50}.modal.open{display:flex}.modal-card{background:#fff;padding:22px;border-radius:16px;width:min(600px,92vw)}.form-grid>*{flex:1 1 220px}.badge{padding:4px 8px;border-radius:999px;background:#f3f4f6}@media(max-width:800px){.sidebar{display:none}.main{margin:0!important;padding:16px}table{font-size:13px}}</style></head><body><aside class="sidebar"><div class="brand"><div class="brand-logo">E</div><div><h2>EMS</h2><small>Employee Management System</small></div></div><nav>
<a href="index.html">Dashboard</a><a href="karyawan.html">Karyawan</a><a href="absen.html">Absensi</a><a href="shift.html">Jadwal Shift</a><a href="izin.html">Izin & Cuti</a><a href="rekap.html">Rekap Absensi</a><a href="payroll.html">Payroll</a><a href="pengumuman.html">Pengumuman</a><a href="qr-toko.html">QR Toko</a><a href="pengaturan.html">Pengaturan</a></nav></aside><main class="main"><h1>Approval Izin & Cuti</h1><p>Setujui atau tolak pengajuan tanpa menghapus data lama.</p><div class="toolbar"><select id="toko"><option value="">Semua Toko</option></select><select id="status"><option value="">Semua Status</option><option>Menunggu</option><option>Disetujui</option><option>Ditolak</option></select><input id="mulai" type="date"><input id="akhir" type="date"><input id="cari" placeholder="Cari karyawan"><button class="primary" onclick="load()">Terapkan</button></div><div class="cards"><div class="mini">Total<b id="total">0</b></div><div class="mini">Menunggu<b id="menunggu">0</b></div><div class="mini">Disetujui<b id="disetujui">0</b></div><div class="mini">Ditolak<b id="ditolak">0</b></div></div><div class="panelx"><table><thead><tr><th>Tanggal</th><th>Karyawan</th><th>Toko</th><th>Jenis</th><th>Alasan</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="body"></tbody></table></div></main><script src="js/config.js"></script><script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let rows=[];async function stores(){let d=await(await fetch(`${EMS_API_URL}?action=listToko`)).json();(d.items||[]).forEach(x=>toko.add(new Option(x.nama,x.id)));}async function load(){let q=new URLSearchParams({action:'listIzinAdmin',idToko:toko.value,status:status.value,tanggalMulai:mulai.value,tanggalAkhir:akhir.value,cari:cari.value});let d=await(await fetch(`${EMS_API_URL}?${q}&t=${Date.now()}`)).json();rows=d.items||[];Object.keys(d.summary||{}).forEach(k=>document.getElementById(k)&&(document.getElementById(k).textContent=d.summary[k]));body.innerHTML=rows.map((x,i)=>`<tr><td>${esc(x.tanggal)}</td><td><b>${esc(x.nama)}</b><br><small>${esc(x.idKaryawan)}</small></td><td>${esc(x.idToko)}</td><td>${esc(x.jenis)}</td><td style="white-space:normal">${esc(x.alasan)}</td><td><span class="badge">${esc(x.status)}</span></td><td>${x.status==='Menunggu'?`<button class="success" onclick="act(${i},'Disetujui')">Setujui</button> <button class="danger" onclick="act(${i},'Ditolak')">Tolak</button>`:'-'}</td></tr>`).join('')||'<tr><td colspan="7">Belum ada data.</td></tr>';}async function act(i,s){let cat=prompt('Catatan admin (opsional):','')??'';let d=await(await fetch(EMS_API_URL,{method:'POST',body:JSON.stringify({action:'updateStatusIzin',row:rows[i].row,status:s,catatanAdmin:cat,diprosesOleh:'Admin',kirimWA:true})})).json();alert(d.message+(d.whatsapp?.manualUrl?'\nTautan WA manual tersedia dan akan dibuka.':''));if(d.whatsapp?.manualUrl)window.open(d.whatsapp.manualUrl,'_blank');load();}stores();load();</script></body></html>
