<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Izin & Cuti - EMS</title><link rel="stylesheet" href="css/style.css"><style>.main{padding:28px}.toolbar,.cards{display:flex;gap:12px;flex-wrap:wrap}.toolbar>*{min-height:42px}.cards{margin:18px 0}.mini{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;min-width:150px}.mini b{display:block;font-size:26px}.panelx{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid #eee;text-align:left;white-space:nowrap}input,select,button{font:inherit;padding:10px;border:1px solid #d1d5db;border-radius:9px}button{cursor:pointer}.primary{background:#5b4df7;color:#fff;border:0}.danger{background:#fee2e2;color:#991b1b}.success{background:#dcfce7;color:#166534}.badge{padding:4px 8px;border-radius:999px;background:#f3f4f6}@media(max-width:800px){.sidebar{display:none}.main{margin:0!important;padding:16px}table{font-size:13px}}</style></head><body><aside class="sidebar"><div class="brand"><div class="brand-logo">E</div><div><h2>EMS</h2><small>Employee Management System</small></div></div><nav><a href="index.html">Dashboard</a><a href="karyawan.html">Karyawan</a><a href="absen.html">Absensi</a><a href="shift.html">Jadwal Shift</a><a href="izin.html">Izin & Cuti</a><a href="rekap.html">Rekap Absensi</a><a href="payroll.html">Payroll</a><a href="pengumuman.html">Pengumuman</a><a href="qr-toko.html">QR Toko</a><a href="pengaturan.html">Pengaturan</a></nav></aside><main class="main"><h1>Approval Izin & Cuti</h1><p>Setujui atau tolak pengajuan tanpa menghapus data lama.</p><div class="toolbar"><select id="filterToko"><option value="">Semua Toko</option></select><select id="filterStatus"><option value="">Semua Status</option><option>Menunggu</option><option>Disetujui</option><option>Ditolak</option></select><input id="filterMulai" type="date"><input id="filterAkhir" type="date"><input id="filterCari" placeholder="Cari karyawan"><button class="primary" id="btnTerapkan">Terapkan</button></div><div class="cards"><div class="mini">Total<b id="total">0</b></div><div class="mini">Menunggu<b id="menunggu">0</b></div><div class="mini">Disetujui<b id="disetujui">0</b></div><div class="mini">Ditolak<b id="ditolak">0</b></div></div><div class="panelx"><table><thead><tr><th>Periode</th><th>Karyawan</th><th>Toko</th><th>Jenis</th><th>Alasan</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="tableBody"></tbody></table></div></main><script src="js/config.js"></script><script src="js/admin-auth.js"></script><script>
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let rows=[];
async function stores(){try{const d=await(await fetch(`${EMS_API_URL}?action=listToko&t=${Date.now()}`)).json();(d.items||[]).forEach(x=>$('filterToko').add(new Option(x.nama,x.id)));}catch(e){console.error(e)}}
async function load(){try{const q=new URLSearchParams({action:'listIzinAdmin',idToko:$('filterToko').value,status:$('filterStatus').value,tanggalMulai:$('filterMulai').value,tanggalAkhir:$('filterAkhir').value,cari:$('filterCari').value});const d=await(await fetch(`${EMS_API_URL}?${q}&t=${Date.now()}`,{cache:'no-store'})).json();if(!d.success)throw new Error(d.message||'Gagal memuat izin.');rows=d.items||[];for(const [k,v] of Object.entries(d.summary||{})){const el=$(k);if(el)el.textContent=v}$('tableBody').innerHTML=rows.map((x,i)=>`<tr><td>${esc(x.tanggal)}${x.tanggalSelesai&&x.tanggalSelesai!==x.tanggal?' s.d. '+esc(x.tanggalSelesai):''}${x.bukti?`<br><a href="${esc(x.bukti)}" target="_blank" rel="noopener">Lihat bukti</a>`:''}</td><td><b>${esc(x.nama)}</b><br><small>${esc(x.idKaryawan)}</small></td><td>${esc(x.idToko)}</td><td>${esc(x.jenis)}</td><td style="white-space:normal">${esc(x.alasan)}</td><td><span class="badge">${esc(x.status)}</span></td><td>${x.status==='Menunggu'?`<button class="success" onclick="act(${i},'Disetujui')">Setujui</button> <button class="danger" onclick="act(${i},'Ditolak')">Tolak</button>`:'-'}</td></tr>`).join('')||'<tr><td colspan="7">Belum ada data.</td></tr>';}catch(e){console.error(e);$('tableBody').innerHTML=`<tr><td colspan="7">${esc(e.message)}</td></tr>`}}
async function act(i,s){const cat=prompt('Catatan admin (opsional):','')??'';const d=await(await fetch(EMS_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'updateStatusIzin',row:rows[i].row,status:s,catatanAdmin:cat,diprosesOleh:'Admin',kirimWA:true})})).json();alert(d.message+(d.whatsapp?.manualUrl?'\nTautan WA manual tersedia dan akan dibuka.':''));if(d.whatsapp?.manualUrl)window.open(d.whatsapp.manualUrl,'_blank');load()}
$('btnTerapkan').addEventListener('click',load);stores();load();
</script></body></html>
