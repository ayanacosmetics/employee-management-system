<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#5b4df7"><title>Portal Karyawan - EMS</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><script src="js/config.js"></script><style>
:root{--p:#5b4df7;--bg:#f6f7fb;--ink:#172033;--muted:#6b7280}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}.portal{max-width:960px;margin:auto;padding:18px 18px 92px}.hero{background:linear-gradient(135deg,#5b4df7,#7c3aed);color:#fff;border-radius:24px;padding:22px;box-shadow:0 18px 45px #5b4df735}.hero-top{display:flex;justify-content:space-between;gap:14px;align-items:center}.avatar{width:58px;height:58px;border-radius:18px;background:#ffffff25;display:grid;place-items:center;font-size:24px;font-weight:800}.hero h1{margin:4px 0;font-size:24px}.hero p{margin:3px 0;color:#eee}.today{margin-top:18px;background:#ffffff18;border:1px solid #ffffff28;border-radius:17px;padding:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.today small{display:block;color:#e7e5ff}.today b{display:block;margin-top:4px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}.menu{border:0;background:#fff;border-radius:18px;padding:17px;text-align:left;box-shadow:0 8px 24px #1118270c;cursor:pointer}.menu span{font-size:25px}.menu b{display:block;margin-top:9px}.panel{display:none;background:#fff;border-radius:20px;padding:18px;box-shadow:0 8px 26px #1118270c}.panel.active{display:block}.head{display:flex;justify-content:space-between;align-items:center;gap:12px}.list{display:grid;gap:10px}.item{border:1px solid #e5e7eb;border-radius:15px;padding:14px}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#f3f4f6;font-size:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:11px;border:1px solid #d1d5db;border-radius:11px}.toolbar input,.toolbar select{width:auto}.primary{border:0;background:var(--p);color:#fff;padding:11px 14px;border-radius:11px;font-weight:700}.secondary{border:1px solid #d1d5db;background:#fff;padding:11px 14px;border-radius:11px}.form{display:grid;gap:11px}.money{font-size:28px;font-weight:800}.bottom{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);width:min(620px,calc(100% - 20px));background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:8px;display:flex;justify-content:space-around;box-shadow:0 14px 38px #11182725}.bottom button{border:0;background:none;padding:8px;color:#4b5563}.bottom b{display:block;font-size:11px}.install{background:#fff;color:#4c1d95;border:0;padding:9px 12px;border-radius:10px}@media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}.today{grid-template-columns:1fr 1fr}.portal{padding:12px 12px 90px}.hero{border-radius:20px}}
</style></head><body><main class="portal"><section class="hero"><div class="hero-top"><div style="display:flex;gap:13px;align-items:center"><div class="avatar" id="avatar">K</div><div><small>Selamat datang</small><h1 id="nama">Memuat...</h1><p id="meta">-</p></div></div><button id="installBtn" class="install" hidden>Install</button></div><div class="today"><div><small>Shift hari ini</small><b id="shift">-</b></div><div><small>Masuk</small><b id="masuk">Belum absen</b></div><div><small>Pulang</small><b id="pulang">Belum absen</b></div></div></section><section class="grid"><button class="menu" onclick="show('jadwal')"><span>📅</span><b>Jadwal Saya</b></button><button class="menu" onclick="show('riwayat')"><span>🕒</span><b>Riwayat Saya</b></button><button class="menu" onclick="show('izin')"><span>📝</span><b>Izin & Cuti</b></button><button class="menu" onclick="show('pengumuman')"><span>📢</span><b>Pengumuman</b></button><button class="menu" onclick="show('payroll')"><span>💰</span><b>Slip Gaji</b></button><button class="menu" onclick="show('profil')"><span>👤</span><b>Profil</b></button></section>
<section id="home" class="panel active"><div class="head"><div><h2>Ringkasan Hari Ini</h2><p id="statusHari">Memuat status absensi...</p></div><button class="primary" onclick="absenLagi()">Absen di Toko</button></div></section>
<section id="jadwal" class="panel"><div class="head"><h2>Jadwal Saya</h2><button class="secondary" onclick="loadJadwal()">Perbarui</button></div><div id="jadwalList" class="list"></div></section>
<section id="riwayat" class="panel"><div class="head"><h2>Riwayat Absensi</h2></div><div class="toolbar"><input id="periodeRiwayat" type="month"><button class="primary" onclick="loadRiwayat()">Muat</button></div><div id="riwayatList" class="list"></div></section>
<section id="izin" class="panel"><div class="head"><h2>Ajukan Izin / Cuti</h2></div><form class="form" onsubmit="submitIzin(event)"><select id="jenisIzin" required><option value="">Pilih jenis</option><option>Cuti</option><option>Sakit</option><option>Izin Pribadi</option><option>Izin Terlambat</option><option>Izin Pulang Cepat</option><option>Dinas Luar</option></select><label>Tanggal mulai<input id="izinMulai" type="date" required></label><label>Tanggal selesai<input id="izinSelesai" type="date" required></label><textarea id="alasanIzin" rows="4" placeholder="Jelaskan alasan" required></textarea><label>Bukti pendukung (opsional, gambar/PDF maksimal 2 MB)<input id="buktiIzin" type="file" accept="image/*,.pdf"></label><button class="primary">Kirim Pengajuan</button></form><h3>Status Pengajuan</h3><div id="izinList" class="list"></div></section>
<section id="pengumuman" class="panel"><div class="head"><h2>Pengumuman</h2><button class="secondary" onclick="loadPengumuman()">Perbarui</button></div><div id="pengumumanList" class="list"></div></section>
<section id="payroll" class="panel"><div class="head"><h2>Slip Gaji</h2></div><div class="toolbar"><input id="periodePayroll" type="month"><button class="primary" onclick="loadPayroll()">Muat</button></div><div id="payrollBox"></div></section>
<section id="profil" class="panel"><div class="head"><h2>Profil Saya</h2></div><div class="form"><label>ID Karyawan<input id="profilId" disabled></label><label>Nama<input id="profilNama" disabled></label><label>Toko<input id="profilToko" disabled></label><label>Nomor WhatsApp<input id="profilHp" inputmode="tel"></label><label>PIN baru (opsional)<input id="profilPin" type="password" inputmode="numeric" maxlength="4" placeholder="Kosongkan bila tidak diganti"></label><button class="primary" onclick="saveProfil()">Simpan Profil</button><button class="secondary" onclick="logout()">Keluar dari Portal</button></div></section></main><nav class="bottom"><button onclick="show('home')">🏠<b>Beranda</b></button><button onclick="show('jadwal')">📅<b>Jadwal</b></button><button onclick="show('izin')">📝<b>Izin</b></button><button onclick="show('payroll')">💰<b>Gaji</b></button><button onclick="show('profil')">👤<b>Profil</b></button></nav><script>
const session=JSON.parse(localStorage.getItem('ems_portal_session')||'null');if(!session?.token||session.expiresAt<=Date.now())location.replace('portal-login.html');const token=session?.token||'';const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const dateID=s=>s?new Date(s+'T00:00:00').toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'}):'-';const rup=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n||0);let homeData=null;function auth(d){if(d?.sessionExpired){localStorage.removeItem('ems_portal_session');location.replace('portal-login.html');throw new Error(d.message)}return d}async function api(action,params={}){const q=new URLSearchParams({action,token,...params,t:Date.now()});return auth(await(await fetch(`${EMS_API_URL}?${q}`)).json())}function show(id){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo({top:330,behavior:'smooth'});({jadwal:loadJadwal,riwayat:loadRiwayat,izin:loadIzin,pengumuman:loadPengumuman,payroll:loadPayroll}[id]||(()=>{}))()}async function loadHome(){try{const d=await api('getPortalHome');homeData=d;nama.textContent=d.karyawan.nama;avatar.textContent=d.karyawan.nama.charAt(0).toUpperCase();meta.textContent=`${d.karyawan.jabatan||'Karyawan'} · ${d.toko?.nama||d.karyawan.idToko}`;shift.textContent=d.shift?`${d.shift.nama} (${d.shift.masuk}-${d.shift.pulang})`:'-';masuk.textContent=d.hariIni?.jamMasuk||'Belum absen';pulang.textContent=d.hariIni?.jamPulang||'Belum absen';statusHari.textContent=d.hariIni?`${d.hariIni.statusMasuk||''}${d.hariIni.statusPulang?' · '+d.hariIni.statusPulang:''}`:'Anda belum melakukan absensi hari ini.';profilId.value=d.karyawan.id;profilNama.value=d.karyawan.nama;profilToko.value=d.toko?.nama||d.karyawan.idToko;profilHp.value=d.karyawan.noHp||''}catch(e){Swal.fire('Gagal memuat portal',e.message,'error')}}function absenLagi(){const toko=homeData?.karyawan?.idToko;if(!toko)return Swal.fire('Toko belum tersedia','','warning');location.href=`absen.html?toko=${encodeURIComponent(toko)}`}async function loadJadwal(){const start=new Date();const end=new Date();end.setDate(end.getDate()+13);const d=await api('getPortalJadwal',{tanggalMulai:start.toISOString().slice(0,10),tanggalAkhir:end.toISOString().slice(0,10)});jadwalList.innerHTML=(d.items||[]).map(x=>`<div class="item"><b>${dateID(x.tanggal)}</b><div>${x.shift?`${esc(x.shift.nama)} · ${esc(x.shift.masuk)}–${esc(x.shift.pulang)}`:'Jadwal belum tersedia'}</div></div>`).join('')}async function loadRiwayat(){const [y,m]=(periodeRiwayat.value||new Date().toISOString().slice(0,7)).split('-');const d=await api('getPortalRiwayat',{bulan:m,tahun:y});riwayatList.innerHTML=(d.items||[]).map(x=>`<div class="item"><b>${esc(x.tanggal)} · ${esc(x.shift)}</b><p>Masuk: ${esc(x.jamMasuk||'-')} <span class="badge">${esc(x.statusMasuk||'-')}</span></p><p>Pulang: ${esc(x.jamPulang||'-')} <span class="badge">${esc(x.statusPulang||'-')}</span></p><small>${esc(x.durasi||'')}</small></div>`).join('')||'<p>Belum ada riwayat pada periode ini.</p>'}async function fileData(file){if(!file)return'';if(file.size>2*1024*1024)throw new Error('Ukuran bukti maksimal 2 MB.');return await new Promise((ok,no)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=no;r.readAsDataURL(file)})}async function submitIzin(e){e.preventDefault();try{Swal.fire({title:'Mengirim...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});const body={action:'saveIzinPortal',token,jenis:jenisIzin.value,tanggalMulai:izinMulai.value,tanggalSelesai:izinSelesai.value,alasan:alasanIzin.value,buktiBase64:await fileData(buktiIzin.files[0])};const d=auth(await(await fetch(EMS_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})).json());if(!d.success)throw new Error(d.message);e.target.reset();Swal.fire('Berhasil',d.message,'success');loadIzin()}catch(err){Swal.fire('Gagal',err.message,'error')}}async function loadIzin(){const d=await api('getPortalIzin');izinList.innerHTML=(d.items||[]).map(x=>`<div class="item"><b>${esc(x.jenis)} · ${dateID(x.tanggalMulai)} s.d. ${dateID(x.tanggalSelesai)}</b><p>${esc(x.alasan)}</p><span class="badge">${esc(x.status)}</span>${x.catatanAdmin?`<p><small>Catatan admin: ${esc(x.catatanAdmin)}</small></p>`:''}${x.bukti?`<a href="${esc(x.bukti)}" target="_blank">Lihat bukti</a>`:''}</div>`).join('')||'<p>Belum ada pengajuan.</p>'}async function loadPengumuman(){const d=await api('getPortalPengumuman');pengumumanList.innerHTML=(d.items||[]).map(x=>`<article class="item"><small>${dateID(x.tanggalMulai)}${x.tanggalSelesai?' – '+dateID(x.tanggalSelesai):''}</small><h3>${esc(x.judul)}</h3><p style="white-space:pre-wrap">${esc(x.isi)}</p></article>`).join('')||'<p>Tidak ada pengumuman aktif.</p>'}async function loadPayroll(){const [y,m]=(periodePayroll.value||new Date().toISOString().slice(0,7)).split('-');const d=await api('getPortalPayroll',{bulan:m,tahun:y});if(!d.payroll){payrollBox.innerHTML='<div class="item">Slip gaji periode ini belum tersedia.</div>';return}const x=d.payroll;payrollBox.innerHTML=`<div class="item"><span class="badge">${esc(x.status)}</span><h3>${esc(x.periode)}</h3><p>Hadir ${x.hadir} hari · Terlambat ${x.terlambat} kali</p><hr><p>Gaji Pokok <b style="float:right">${rup(x.gajiPokok)}</b></p><p>Tunjangan <b style="float:right">${rup(x.tunjangan)}</b></p><p>Potongan <b style="float:right">-${rup(x.potongan)}</b></p><hr><div class="money">${rup(x.gajiBersih)}</div><p>${esc(x.catatan||'')}</p><button class="secondary" onclick="print()">Cetak / Simpan PDF</button></div>`}async function saveProfil(){try{const body={action:'updateProfilPortal',token,noHp:profilHp.value,pinBaru:profilPin.value};const d=auth(await(await fetch(EMS_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)})).json());if(!d.success)throw new Error(d.message);session.token=d.token||token;session.expiresAt=Date.now()+12*3600000;localStorage.setItem('ems_portal_session',JSON.stringify(session));profilPin.value='';Swal.fire('Berhasil',d.message,'success')}catch(e){Swal.fire('Gagal',e.message,'error')}}function logout(){localStorage.removeItem('ems_portal_session');location.replace('portal-login.html')}periodeRiwayat.value=periodePayroll.value=new Date().toISOString().slice(0,7);const today=new Date().toISOString().slice(0,10);izinMulai.value=izinSelesai.value=today;let deferred;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;installBtn.hidden=false});installBtn.onclick=async()=>{if(deferred){deferred.prompt();await deferred.userChoice;deferred=null;installBtn.hidden=true}};if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');loadHome();
</script></body></html>
