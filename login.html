<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login Admin - EMS</title><link rel="stylesheet" href="css/style.css"><style>body{min-height:100vh;display:grid;place-items:center;background:#f5f3ff;padding:20px}.card{width:min(430px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:24px;padding:28px;box-shadow:0 24px 70px #312e8122}.logo{width:52px;height:52px;border-radius:16px;background:#5b4df7;color:#fff;display:grid;place-items:center;font-weight:800;font-size:24px}.card h1{margin:18px 0 4px}.card p{color:#6b7280}.field{display:grid;gap:7px;margin:16px 0}.field input{font:inherit;padding:13px;border:1px solid #d1d5db;border-radius:11px}.primary{width:100%;border:0;border-radius:11px;padding:13px;background:#5b4df7;color:#fff;font:inherit;font-weight:700;cursor:pointer}.note{font-size:13px;background:#f3f4f6;padding:12px;border-radius:10px;margin:14px 0}.error{color:#b91c1c;min-height:20px}</style></head><body><main class="card"><div class="logo">E</div><h1 id="title">Login Admin EMS</h1><p id="subtitle">Masuk untuk mengelola data sensitif EMS.</p><div id="setupNote" class="note" hidden>Akun admin belum dibuat. Buat username dan password pertama. Proses ini hanya dapat dilakukan satu kali.</div><form id="form"><label class="field">Username<input id="username" autocomplete="username" required minlength="4"></label><label class="field">Password<input id="password" type="password" autocomplete="current-password" required minlength="8"></label><label id="confirmWrap" class="field" hidden>Ulangi Password<input id="confirmPassword" type="password" minlength="8"></label><div id="error" class="error"></div><button id="submit" class="primary">Masuk</button></form></main><script src="js/config.js"></script><script>
const KEY='ems_admin_session';let setup=false;const next=new URLSearchParams(location.search).get('next')||'index.html';
async function init(){try{const d=await(await fetch(`${EMS_API_URL}?action=getAdminSetupStatus&t=${Date.now()}`)).json();setup=!d.configured;if(setup){title.textContent='Buat Akun Admin';subtitle.textContent='Lindungi dashboard dan tindakan penting.';setupNote.hidden=false;confirmWrap.hidden=false;submit.textContent='Buat Akun & Masuk';password.autocomplete='new-password';}}catch(e){error.textContent='Gagal terhubung ke server.'}}
form.onsubmit=async e=>{e.preventDefault();error.textContent='';if(setup&&password.value!==confirmPassword.value){error.textContent='Ulangi password tidak sama.';return}submit.disabled=true;try{const d=await(await fetch(EMS_API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:setup?'setupAdmin':'loginAdmin',username:username.value.trim(),password:password.value})})).json();if(!d.success)throw new Error(d.message||'Login gagal.');localStorage.setItem(KEY,JSON.stringify({token:d.token,username:d.username,expiresAt:Date.now()+(Number(d.expiresInHours)||12)*3600000}));location.replace(next);}catch(e){error.textContent=e.message}finally{submit.disabled=false}};init();
</script></body></html>
