<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pengumuman - EMS</title><link rel="stylesheet" href="css/style.css"><style>.main{padding:28px}.toolbar,.cards,.form-grid{display:flex;gap:12px;flex-wrap:wrap}.toolbar>*{min-height:42px}.cards{margin:18px 0}.mini{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;min-width:150px}.mini b{display:block;font-size:26px}.panelx{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:11px;border-bottom:1px solid #eee;text-align:left;white-space:nowrap}input,select,textarea,button{font:inherit;padding:10px;border:1px solid #d1d5db;border-radius:9px}button{cursor:pointer}.primary{background:#5b4df7;color:#fff;border:0}.danger{background:#fee2e2;color:#991b1b}.success{background:#dcfce7;color:#166534}.modal{display:none;position:fixed;inset:0;background:#0008;align-items:center;justify-content:center;z-index:50}.modal.open{display:flex}.modal-card{background:#fff;padding:22px;border-radius:16px;width:min(600px,92vw)}.form-grid>*{flex:1 1 220px}.badge{padding:4px 8px;border-radius:999px;background:#f3f4f6}@media(max-width:800px){.sidebar{display:none}.main{margin:0!important;padding:16px}table{font-size:13px}}</style></head><body><aside class="sidebar"><div class="brand"><div class="brand-logo">E</div><div><h2>EMS</h2><small>Employee Management System</small></div></div><nav>
<a href="index.html">Dashboard</a><a href="karyawan.html">Karyawan</a><a href="absen.html">Absensi</a><a href="shift.html">Jadwal Shift</a><a href="izin.html">Izin & Cuti</a><a href="rekap.html">Rekap Absensi</a><a href="payroll.html">Payroll</a><a href="pengumuman.html">Pengumuman</a><a href="qr-toko.html">QR Toko</a><a href="pengaturan.html">Pengaturan</a></nav></aside><main class="main"><div class="toolbar" style="justify-content:space-between"><div><h1>Pengumuman</h1><p>Kelola informasi internal karyawan.</p></div><button class="primary" onclick="edit()">+ Buat Pengumuman</button></div><div id="list" class="cards"></div></main><div id="modal" class="modal"><div class="modal-card"><h2>Pengumuman</h2><div class="form-grid"><input id="id" type="hidden"><input id="judul" placeholder="Judul"><select id="idToko"><option value="">Semua Toko</option></select><input id="tanggalMulai" type="date"><input id="tanggalSelesai" type="date"><select id="aktif"><option>Ya</option><option>Tidak</option></select><textarea id="isi" rows="6" placeholder="Isi pengumuman" style="flex-basis:100%"></textarea></div><div class="toolbar" style="margin-top:14px"><button onclick="modal.classList.remove('open')">Batal</button><button class="primary" onclick="save()">Simpan</button></div></div></div><script src="js/config.js"></script><script src="js/admin-auth.js"></script><script>
let data=[];const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function stores(){let d=await(await fetch(`${EMS_API_URL}?action=listToko`)).json();(d.items||[]).forEach(x=>idToko.add(new Option(x.nama,x.id)));}async function load(){let d=await(await fetch(`${EMS_API_URL}?action=listPengumuman&t=${Date.now()}`)).json();data=d.items||[];list.innerHTML=data.map((x,i)=>`<article class="mini" style="flex:1 1 320px"><small>${esc(x.tanggalMulai)} s.d. ${esc(x.tanggalSelesai||'-')} · ${esc(x.idToko||'Semua Toko')}</small><h3>${esc(x.judul)}</h3><p style="white-space:pre-wrap">${esc(x.isi)}</p><button onclick="edit(${i})">Edit</button> <button class="danger" onclick="del(${i})">Hapus</button></article>`).join('')||'<p>Belum ada pengumuman.</p>';}function edit(i){let x=i==null?{aktif:'Ya'}:data[i];['id','judul','idToko','tanggalMulai','tanggalSelesai','aktif','isi'].forEach(k=>document.getElementById(k).value=x[k]||'');modal.classList.add('open');}async function save(){let p={action:'savePengumuman'};['id','judul','idToko','tanggalMulai','tanggalSelesai','aktif','isi'].forEach(k=>p[k]=document.getElementById(k).value);let d=await(await fetch(EMS_API_URL,{method:'POST',body:JSON.stringify(p)})).json();alert(d.message);if(d.success){modal.classList.remove('open');load();}}async function del(i){if(!confirm('Hapus pengumuman ini?'))return;let d=await(await fetch(EMS_API_URL,{method:'POST',body:JSON.stringify({action:'deletePengumuman',id:data[i].id})})).json();alert(d.message);load();}stores();load();</script></body></html>
