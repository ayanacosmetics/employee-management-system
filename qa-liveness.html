<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="css/style.css"><style>body{margin:0;background:#f5f3ff}.qa-shell{max-width:720px;margin:0 auto;padding:24px}.attendance-card{display:block}.attendance-content{display:block!important;text-align:center}#cameraVideo{transform:scaleX(-1)}.camera-frame{background:radial-gradient(circle at 50% 34%,#475569 0 13%,#334155 14% 23%,#1e293b 24% 100%)}.liveness-overlay{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:18px;background:linear-gradient(180deg,rgba(15,23,42,.18),transparent 36%,transparent 62%,rgba(15,23,42,.62));z-index:3}.liveness-face-guide{width:62%;height:67%;margin-top:5%;border:3px solid #60a5fa;border-radius:48% 48% 44% 44%;box-shadow:0 0 0 999px rgba(15,23,42,.08),0 0 24px rgba(255,255,255,.16)}.liveness-status-card{width:100%;display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid rgba(255,255,255,.25);border-radius:14px;background:rgba(15,23,42,.78);color:#fff;backdrop-filter:blur(8px);text-align:left}.liveness-status-card b,.liveness-status-card small{display:block}.liveness-status-card b{font-size:14px}.liveness-status-card small{font-size:12px;color:rgba(255,255,255,.74);margin-top:2px}.liveness-dot{width:10px;height:10px;border-radius:50%;background:#60a5fa;box-shadow:0 0 0 5px rgba(96,165,250,.16);flex:none}.liveness-progress{position:absolute;left:18px;right:18px;bottom:12px;height:4px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.18)}.liveness-progress span{display:block;width:62%;height:100%;background:#60a5fa}.camera-actions{margin-top:16px}@media(max-width:650px){.qa-shell{padding:16px}.liveness-overlay{padding:14px}.liveness-progress{left:14px;right:14px}}</style></head><body><main class="qa-shell"><section class="attendance-card"><div class="attendance-content"><div class="attendance-icon purple">☺</div><h2>Ambil Selfie</h2><p>Posisikan satu wajah di dalam bingkai, tatap kamera, lalu tersenyum untuk verifikasi liveness.</p><div class="camera-frame"><div class="liveness-overlay detected"><div class="liveness-face-guide"></div><div class="liveness-status-card"><span class="liveness-dot"></span><div><b>Sekarang tersenyum</b><small>Tunjukkan senyum alami ke kamera</small></div></div><div class="liveness-progress"><span></span></div></div></div><div class="camera-actions"><button class="attendance-primary" disabled>Ambil Selfie</button></div></div></section></main></body></html>
